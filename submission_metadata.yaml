ai_usage_summary: |
  ChatGPT was used as a development assistant for discussing the ranking pipeline,
  debugging Python issues, and improving project documentation. No external APIs or online services are used during ranking.
  Candidate ranking is performed entirely by locally executed Python code.

methodology_summary: |
  The ranking system combines multiple complementary signals instead of relying
  solely on keyword matching. A rule-based scoring module evaluates candidate
  titles, experience, skills, industries, profile summaries, and career history
  against the job description. Behavioral signals such as recruiter response
  rate, interview completion rate, open-to-work status, recruiter saves, and
  notice period are incorporated to prioritize candidates who are both relevant
  and available. Candidate profiles are further matched to the job description
  using BM25 lexical retrieval and TF-IDF cosine similarity. A lightweight
  honeypot detector penalizes profiles with unrealistic skill-duration and
  proficiency combinations to reduce false positives. The final score is a
  weighted combination of these components, producing the top 100 candidates
  together with human-readable reasoning for each recommendation.

